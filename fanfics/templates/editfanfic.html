{% extends "kilig.html" %}
{% block title %} edit{{fanfic.title}} {% endblock %}

            {% block content %}
            
            <h1 class="all-in-titles">edit fanfic {{fanfic.title}}</h1>
            <div class="all-forms">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    
                    {{ field }}
                    
                    {% if field.errors %}
                    <div class="error">
                        {{ field.errors }}
                    </div>
                    {% endif %}
                </div>
                {% endfor %}
                <input type="submit" value="edit fanfic">
            </form>
            </div>
            {% endblock %}
